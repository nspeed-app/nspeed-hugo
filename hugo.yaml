baseURL: 'https://nspeed.app'
defaultContentLanguage: "en"
languages:
  en:
    disabled: false
    locale: en-US
    direction: ltr
    label: English
    params:
      homeSubtitle: A high performance multi-threaded network bandwidth measurement tool.
    title: NSpeed
    weight: 1

  fr:
    disabled: false
    locale: fr-FR
    direction: ltr
    label: Français
    params:
      homeSubtitle: Un outil de mesure de bande passante réseau multi-thread haute performance.
    title: NSpeed
    weight: 2

title: NSpeed
theme: 
  - hugo-shortcode-roneo-collection
  - hermit-v2
pygmentsCodefences: true
pygmentsUseClasses: true
rssLimit: 10
copyright: >-
  This work is licensed under a Creative Commons Attribution-NonCommercial 4.0
  International License.
enableEmoji: true

module:
  mounts:
    - source: content
      target: content
    - source: layouts
      target: layouts
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: assets
      target: static
    - source: static
      target: static
    - source: tuto
      target: static
    - source: ipv6
      target: static/ipv6
      excludeFiles: "/map/scripts/**"

author:
  name: Jean-Francois Giorgi

params:

  disableKinds: 
    - RSS
    - taxonomy
    - term

  author:
    name: Jean-Francois Giorgi
  # +go-import 
  goPrefix: 'nspeed.app'
  redirect: false
  # -go-import 
  dateform: 'Jan 2, 2006'
  dateformShort: Jan 2
  dateformNum: '2006-01-02'
  dateformNumTime: '2006-01-02 15:04 -0700'
  themeColor: '#2596be'
  homeSubtitle: A high performance multi-threaded network bandwidth measurement tool.
  footerCopyright: ' <a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'
  justifyContent: false
  relatedPosts: false
  code_copy_button: true
  socialLinks:
    - name: "email"
      url: 'mailto:info@nspeed.app'
    - name: "x"
      url: https://twitter.com/jfgiorgi
    - name: "github"
      url: 'https://github.com/nspeed-app/nspeed'
    - name: "bsky"
      url: https://bsky.app/profile/nspeed.app
  homeSubtitlePrinter: false

minify:
  tdewolff:
    html:
      keepQuotes: true


menu:
  main:
    - name: Download
      url: https://github.com/nspeed-app/nspeed/releases/
      weight: 10
    - name: Changelog
      url: posts/changelog/
      weigth: 20
    - name: About
      url: about-nspeed/
      weight: 30
